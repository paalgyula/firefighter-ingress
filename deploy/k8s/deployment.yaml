apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffingress-controller
  namespace: firefighter
  labels:
    app.kubernetes.io/name: firefighter
    app.kubernetes.io/component: ingress-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: firefighter
      app.kubernetes.io/component: ingress-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefighter
        app.kubernetes.io/component: ingress-controller
    spec:
      serviceAccountName: firefighter-ingress
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: pilab/firefighter-ingress:latest
          imagePullPolicy: IfNotPresent
          args:
            - --kubeconfig=/etc/kubernetes/kubeconfig
            - --waf-address=firefighter-waf.firefighter.svc.cluster.local:50051
            - --ingress-class=firefighter
            - --leader-elect=true
            - --crd-enabled=true
            - --metrics-address=:8081
            - --health-address=:8082
            - --v=1
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kubernetes
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeconfig
            optional: true