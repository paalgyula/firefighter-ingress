apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: virtualserverroutes.k8s.pilab.dev
spec:
  group: k8s.pilab.dev
  names:
    kind: VirtualServerRoute
    listKind: VirtualServerRouteList
    plural: virtualserverroutes
    singular: virtualserverroute
    shortNames:
    - vsr
    categories:
    - firefighter
    - networking
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - host
                - upstreams
                - routes
              properties:
                host:
                  type: string
                  description: The host to route (must match parent VirtualServer)
                upstreams:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - name
                      - service
                      - port
                    properties:
                      name:
                        type: string
                      service:
                        type: string
                      port:
                        type: integer
                        minimum: 1
                        maximum: 65535
                      lbMethod:
                        type: string
                        enum: [round_robin, least_conn, ip_hash, least_time]
                        default: round_robin
                      timeout:
                        type: string
                        default: 60s
                      tls:
                        type: object
                        properties:
                          enable:
                            type: boolean
                            default: false
                          verify:
                            type: boolean
                            default: true
                routes:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - path
                    properties:
                      path:
                        type: string
                      methods:
                        type: array
                        items:
                          type: string
                      action:
                        type: object
                        oneOf:
                          - properties:
                              proxy:
                                type: object
                                required:
                                  - upstream
                                properties:
                                  upstream:
                                    type: string
                                  requestHeaders:
                                    type: object
                                    properties:
                                      add:
                                        type: array
                                        items:
                                          type: string
                                      remove:
                                        type: array
                                        items:
                                          type: string
                                  connectTimeout:
                                    type: string
                                    default: 60s
                                  readTimeout:
                                    type: string
                                    default: 60s
                                  sendTimeout:
                                    type: string
                                    default: 60s
                            required:
                              - proxy
                          - properties:
                              redirect:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  code:
                                    type: integer
                                    enum: [301, 302, 307, 308]
                                    default: 302
                            required:
                              - redirect
                          - properties:
                              return:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    default: 200
                                  body:
                                    type: string
                            required:
                              - return
            status:
              type: object
              properties:
                message:
                  type: string
                parentRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
      subresources:
        status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
