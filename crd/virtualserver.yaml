apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  annotations:
    cert-manager.io/inject-ca-from-certificate: ""
  name: virtualservers.k8s.pilab.dev
spec:
  group: k8s.pilab.dev
  names:
    kind: VirtualServer
    listKind: VirtualServerList
    plural: virtualservers
    singular: virtualserver
    shortNames:
    - vs
    categories:
    - firefighter
    - networking
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - host
                - upstreams
              properties:
                host:
                  type: string
                  pattern: "^(\\*\\.)?[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*$"
                  description: The host name for the VirtualServer
                tls:
                  type: object
                  properties:
                    secret:
                      type: string
                      description: Secret containing TLS certificate and key
                    redirect:
                      type: boolean
                      default: false
                      description: Enable HTTP to HTTPS redirect
                    certManager:
                      type: string
                      description: cert-manager ClusterIssuer name
                listener:
                  type: object
                  properties:
                    http:
                      type: string
                      default: standard-http
                    https:
                      type: string
                      default: standard-https
                upstreams:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - name
                      - service
                      - port
                    properties:
                      name:
                        type: string
                        description: Upstream name (referenced in routes)
                      service:
                        type: string
                        description: Kubernetes Service name
                      port:
                        type: integer
                        minimum: 1
                        maximum: 65535
                      lbMethod:
                        type: string
                        enum: [round_robin, least_conn, ip_hash, least_time]
                        default: round_robin
                      timeout:
                        type: string
                        default: 60s
                      keepalive:
                        type: integer
                        default: 16
                      buffers:
                        type: object
                        properties:
                          size:
                            type: string
                            pattern: "^[0-9]+[kKmMgG]?$"
                      healthCheck:
                        type: object
                        properties:
                          path:
                            type: string
                          interval:
                            type: string
                          fails:
                            type: integer
                          passes:
                            type: integer
                      tls:
                        type: object
                        properties:
                          enable:
                            type: boolean
                            default: false
                          verify:
                            type: boolean
                            default: true
                routes:
                  type: array
                  items:
                    type: object
                    required:
                      - path
                    properties:
                      path:
                        type: string
                        description: Path to match (exact or prefix with /*)
                      methods:
                        type: array
                        items:
                          type: string
                          pattern: "^[A-Z]+$"
                      action:
                        type: object
                        oneOf:
                          - properties:
                              proxy:
                                type: object
                                required:
                                  - upstream
                                properties:
                                  upstream:
                                    type: string
                                  requestHeaders:
                                    type: object
                                    properties:
                                      add:
                                        type: array
                                        items:
                                          type: string
                                      remove:
                                        type: array
                                        items:
                                          type: string
                                  responseHeaders:
                                    type: object
                                    properties:
                                      add:
                                        type: array
                                        items:
                                          type: string
                                      remove:
                                        type: array
                                        items:
                                          type: string
                                  connectTimeout:
                                    type: string
                                    default: 60s
                                  readTimeout:
                                    type: string
                                    default: 60s
                                  sendTimeout:
                                    type: string
                                    default: 60s
                            required:
                              - proxy
                          - properties:
                              redirect:
                                type: object
                                properties:
                                  url:
                                    type: string
                                  code:
                                    type: integer
                                    enum: [301, 302, 307, 308]
                                    default: 302
                            required:
                              - redirect
                          - properties:
                              return:
                                type: object
                                properties:
                                  code:
                                    type: integer
                                    default: 200
                                  body:
                                    type: string
                                  headers:
                                    type: array
                                    items:
                                      type: string
                            required:
                              - return
                        description: Action defines what to do with the request
                      errorPages:
                        type: array
                        items:
                          type: object
                          properties:
                            codes:
                              type: array
                              items:
                                type: integer
                            redirect:
                              type: object
                              properties:
                                url:
                                  type: string
                            return:
                              type: object
                              properties:
                                code:
                                  type: integer
                                body:
                                  type: string
                policies:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                errorPages:
                  type: array
                  items:
                    type: object
                    properties:
                      codes:
                        type: array
                        items:
                          type: integer
                      redirect:
                        type: object
                        properties:
                          url:
                            type: string
                      return:
                        type: object
                        properties:
                          code:
                            type: integer
                          body:
                            type: string
                          headers:
                            type: array
                            items:
                              type: string
                externalDNS:
                  type: object
                  properties:
                    enable:
                      type: boolean
                    provider:
                      type: string
                    providerSpecific:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          value:
                            type: string
                http-snippets:
                  type: string
                  description: Custom nginx http context snippets
                server-snippets:
                  type: string
                  description: Custom nginx server context snippets
            status:
              type: object
              properties:
                message:
                  type: string
                state:
                  type: string
                  enum: [Warning, Valid, Invalid]
      subresources:
        status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []