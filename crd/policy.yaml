apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: policies.k8s.pilab.dev
spec:
  group: k8s.pilab.dev
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
    categories:
    - firefighter
    - networking
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                rateLimit:
                  type: object
                  properties:
                    zone:
                      type: object
                      required:
                        - name
                        - size
                      properties:
                        name:
                          type: string
                          description: Rate limit zone name
                        size:
                          type: string
                          default: 10M
                          description: Zone size (e.g., 10M)
                    rate:
                      type: string
                      description: Allowed requests per second (e.g., 10r/s)
                    key:
                      type: string
                      enum: [remote_addr, http_x_forwarded_for, http_cookie, jwt_claim]
                      default: remote_addr
                      description: Variable to use as rate limit key
                    delay:
                      type: integer
                      default: 0
                      description: Delay before rejecting (0 = reject immediately)
                    burst:
                      type: integer
                      default: 0
                      description: Burst requests allowed
                    reject:
                      type: boolean
                      default: true
                      description: Reject when limit exceeded
                jwt:
                  type: object
                  properties:
                    key:
                      type: string
                      description: Secret or JWKS URI
                    realm:
                      type: string
                    token:
                      type: string
                      description: Token location (header, cookie)
                    tokenHeader:
                      type: string
                      default: Authorization
                    tokenPrefix:
                      type: string
                      default: Bearer
                    cookie:
                      type: string
                    claims:
                      type: array
                      items:
                        type: string
                    signMethod:
                      type: string
                      enum: [RS256, RS384, RS512, ES256, ES384, HS256, HS384, HS512]
                    jwksURI:
                      type: string
                    jwksCacheSize:
                      type: integer
                      default: 200
                    jwksCacheTTL:
                      type: string
                      default: 1h
                accessControl:
                  type: object
                  properties:
                    deny:
                      type: array
                      items:
                        type: string
                        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]+$"
                      description: CIDR blocks to deny
                    allow:
                      type: array
                      items:
                        type: string
                        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]+$"
                      description: CIDR blocks to allow
                    denyAll:
                      type: boolean
                      default: false
                ingressClass:
                  type: object
                  properties:
                    name:
                      type: string
                      description: IngressClass to apply policy to
            status:
              type: object
              properties:
                message:
                  type: string
                state:
                  type: string
      subresources:
        status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []